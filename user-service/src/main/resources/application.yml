server:
  port: 8086
spring:
  application:
    name: user-service # This name is used in WebClient URI
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,configprops,headdump,httpexchanges,loggers,mappings,customs-beans,prometheus
  endpoint:
    health:
      show-details: always #show details in the health endpoint
    env:
      show-values: always #show values in the env endpoint
    configprops:
      show-values: always #show values in the configprops endpoint
    info:
      build:
        enabled: true
      env:
        enabled: true
      git:
        enabled: true
      java:
        enabled: true
      os:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0 # Adjust the sampling probability as needed (0.0 to 1.0)
tracing:
  url: ${TRACING_URL:http://localhost:4318/v1/traces} #OTLP endpoint for Jaeger in local environment,defaults to localhost if not set.In docker-compose,it will be set to: http://ecommerce-jaeger:4318/v1/traces
# kafka configurations
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  consumer:
    group-id: user-service-group
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
      spring.json.trusted.packages: '*' #trust all packages for JSON serialization/deserialization
      metrics.reporters: ""
      client.telemetry.reporter.enabled: false #disable client telemetry to reduce overhead
    topics:
      user-created: user-created-topic
      user-updated: user-updated-topic
      user-deleted: user-deleted-topic
logging:
  level:
    org.flywaydb: INFO #set Flyway logging level to INFO
    org.springframework.r2dbc: INFO #set R2DBC logging level to DEBUG for detailed SQL logs
    io.r2dbc: INFO #set R2DBC core logging level to DEBUG
