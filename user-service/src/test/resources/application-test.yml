spring:
  r2dbc:
    url: r2dbc:tc:postgresql:15.0://user_service_db
    username: postgres
    password: postgres
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30000 #30 seconds
      max-acquire-time: 60000 #60 seconds
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  flyway:
    enabled: true #disable flyway during tests, we are not testing migrations here
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  cache:
    type: none
  eureka:
    client:
      enabled: false
    instance:
      hostname: localhost
  redis:
    enabled: false
    jackson:
      serialization:
        write-dates-as-timestamps: false
api:
  endpoint:
    base-url: /api/v1

app:
  security:
    enabled: true
  admin:
    username: admin
    password: Admin@123