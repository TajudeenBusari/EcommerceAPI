# no need to create a SwaggerAggregateConfig bean for this, it is already here
springdoc: #access at http://localhost:8080/swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    #tell swagger UI where to find the config
    config-url: /v3/api-docs/swagger-config
    #use default swagger-ui.html page
    url: /v3/api-docs
    ## no need to create a SwaggerAggregateConfig bean for this, it is already here. List all the services here for aggregation
    urls:
    - name: Product Service
      url: /aggregate/product-service/v3/api-docs
    - name: Inventory Service
      url: /aggregate/inventory-service/v3/api-docs
    - name: Order Service
      url: /aggregate/order-service/v3/api-docs
    - name: Notification Service
      url: /aggregate/notification-service/v3/api-docs
    - name: User Service
      url: /aggregate/user-service/v3/api-docs
    try-it-out-enabled: true
    display-request-duration: true
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    show-extensions: true
    show-common-extensions: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,configprops,httpexchanges,loggers,mappings,prometheus
  endpoint:
    health:
      show-details: always #show details in the health endpoint
    env:
      show-values: always #show values in the env endpoint
    configprops:
      show-values: always #show values in the configprops endpoint
  info:
    build:
      enabled: true
    env:
      enabled: true
    git:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0 # Adjust the sampling probability as needed (0.0 to 1.0)
tracing:
  url: ${TRACING_URL:http://localhost:4318/v1/traces} #OTLP endpoint for Jaeger in local environment, defaults to localhost if not set.In docker-compose, it will be set to: http://ecommerce-jaeger:4318/v1/traces

logging:
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}] [traceId=%X{traceId}, spanId=%X{spanId}] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}] [traceId=%X{traceId}, spanId=%X{spanId}] %-5level %logger{36} - %msg%n"
  file:
    name: ./logs/api-gateway/app.log # Log file path
  level:
    org.springframework.cloud.gateway: DEBUG
    com.tjtechy: DEBUG
    org.springframework.web: DEBUG

#info details
info:
  app:
    name:
    description: API Gateway
    version: @project.version@ #retrieved from pom.xml
api:
  openapi:
    gatewayUrl: http://localhost:8080 #override the default URL with the gateway URL, this is important for swagger-ui to work correctly and show the correct URLs for the downstream services


