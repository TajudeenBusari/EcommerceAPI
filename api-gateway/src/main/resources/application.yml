server:
  port: 8080
spring:
  main:
    web-application-type: reactive #use reactive web application type
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          #new
      globalcors:
        #THE CORS CONFIG CAN ALSO BE DONE VIA A BEAN INSTEAD OF YAML
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: #allow all origins
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              #- "http://host.docker.internal:[*]" #for docker desktop
              #- "http://api-gateway:[*]" #for docker-compose internal access http://172.18.0.15
              #- "http://172.18.0.*:[*]" #for docker-compose internal access
            allowedMethods: #allow all methods
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: #allow all headers
              - '*'
            allowCredentials: true #allow credentials
            maxAge: 3600 #cache preflight response for 1 hour
