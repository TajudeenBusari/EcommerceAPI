name: Ecommerce Microservices CI with Maven

on:
  pull_request:
    branches:
      - master
# Available to all
env:
  FIREBASE_CONFIG_BASE64: ${{ secrets.FIREBASE_CONFIG_BASE64 }}
  JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
  JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}

jobs:
  #first job builds all modules and skips tests
  build:
    name: Build All Modules (skip tests)
    runs-on: ubuntu-latest
    #env:
      #FIREBASE_CONFIG_BASE64: ${{ secrets.FIREBASE_CONFIG_BASE64 }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Decode and save Firebase config
        run: echo "$FIREBASE_CONFIG_BASE64" | base64 -d > firebase-service-account.json

      - name: Create JWT Key file
        run: |
          mkdir -p user-service/src/main/resources/certs
          printf "%s" "$JWT_PRIVATE_KEY" > user-service/src/main/resources/certs/private.pem
          printf "%s" "$JWT_PUBLIC_KEY" > user-service/src/main/resources/certs/public.pem

      - name: Build all modules (skipping tests)
        run: mvn --batch-mode clean install -DskipTests
    outputs:
      build-status-key: ${{ steps.cache.outputs.cache-hit }}

  #second job runs tests on the built modules
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Decode and save Firebase config
        run: echo "$FIREBASE_CONFIG_BASE64" | base64 -d > firebase-service-account.json

      - name: Create JWT Key file
        run: |
          mkdir -p user-service/src/main/resources/certs
          printf "%s" "$JWT_PRIVATE_KEY" > user-service/src/main/resources/certs/private.pem
          printf "%s" "$JWT_PUBLIC_KEY" > user-service/src/main/resources/certs/public.pem

      - name: Run tests
        run: mvn --batch-mode test

