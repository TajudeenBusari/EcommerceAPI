
services:
  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

#NOTE:
#To view the table structure and initial data,
#you can connect to the Postgres container and run SQL commands (root directory where docker-compose.yml is located):
#docker exec -it ecommerce-postgres psql -U postgres (-U postgres= connects as user 'postgres')
#once in the psql prompt, you can run the following PostgreSQL commands lines in the psql shell:
#\l  (to list tables)
#\c ECommerce-Order-Service (to connect to a specific database)
#\dt (list tables in the connected database)
#exit (to exit psql shell)
#Another option is to use the pgAdmin GUI tool to connect to the
#Postgres database using the same connection details in the .env file
  postgres:
    image: postgres:latest
    container_name: ecommerce-postgres
    env_file:
        - .env #current directory
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
#      - postgres-data:/var/lib/postgresql/data
      - postgres-data:/var/lib/postgresql #the latest image does not require /data subdirectory CHECK THREAD HERE:https://github.com/docker-library/postgres/pull/1259
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3

  #PgAdmin (optional, for managing Postgres via a web interface)
  #The volume mount ./servers.json:/pgadmin4/servers.json in your docker-compose.yml is telling Docker:
  #"Take the file servers.json from the current directory on my
  #host machine and map it to the path /pgadmin4/servers.json inside the pgAdmin container."
  #As long as the pgadmin interface is opened in the browser, connection updates will keep coming into the log

  pgadmin:
    image: elestio/pgadmin:latest #dpage/pgadmin4
    container_name: pgadmin
#    env_file: #since email and password are provided below, no need for .env file here but if we move them to .env, then uncomment this.
#      - .env #current directory
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050" #Host port 5050 -> Container port 5050
    volumes:
      - ./servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-network
#this is optional
#    healthcheck:
#      test: ["CMD", "curl", "-f", "http://localhost:5050"]
#      interval: 30s
#      timeout: 10s
#      retries: 3

  #Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 5
      ZOOKEEPER_INIT_LIMIT: 10
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 3

  #Kafka broker
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka
    ports:
      - "9092:9092" #for container to container communication
      - "9093:9093" #Optional: for external access, e.g. services on local machine
    depends_on:
#      - zookeeper
        zookeeper:
            condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093 #new
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      #Advertise:
      #internal services (Docker containers) will use kafka:9092
      #external services (e.g. local machine) will use localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT #new
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 200000000 #200mb
      KAFKA_REPLICA_FETCH_MAX_BYTES: 200000000 #200mb
      KAFKA_METRICS_REPORTER_TELEMETRY_API_ENABLED: "false" #Disable Kafka broker telemetry to reduce logging noise
      #This WARN from kafka server log can be ignored for now: WARN [Controller id=1, targetBrokerId=1] Connection to
      #node 1 (kafka/172.24.0.3:9092) could not be established. Broker may not be available. (org.apache.kafka.clients.NetworkClient)

    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "nc", "-z", "kafka", "9092"]
#      test: ["CMD", "kafka-ready", "1", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3

  #schema registry for Kafka
  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.0
    container_name: schema-registry
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_ACCESS_CONTROL_ALLOW_ORIGIN: "*"
      SCHEMA_REGISTRY_ACCESS_CONTROL_ALLOW_METHODS: "GET, POST, PUT, DELETE, OPTIONS"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s #wait for 60 seconds before starting health check

  # KAFKA UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080" #Host port 8090 -> Container port 8080
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      #SERVER_PORT: 8090
      KAFKA_CLUSTERS_0_NAME: local #kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092 #kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY_URL: "http://schema-registry:8081"
      DYNAMIC_CONFIGURATION_ENABLED: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_ENDPOINT_HEALTH_SHOWDETAILS: always
      MANAGEMENT_HEALTH_KAFKA_ENABLED: "true"
      MANAGEMENT_HEALTH_KAFKA_TIMEOUT: "30000"  # 10s timeout
      KAFKA_CLUSTERS_0_PROPERTIES_REQUEST_TIMEOUT_MS: 30000 # 10s timeout for Kafka requests
      KAFKA_CLUSTERS_0_PROPERTIES_RETRY_BACKOFF_MS: 1000 # 0
      KAFKA_CLUSTERS_0_READONLY: "false"

    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  #=================
  #THE EUREKA SERVER
  #=================
  eureka-server:
    build: eureka-server
    container_name: eureka-server
    ports:
      - "8763:8763"
    volumes:
      - ./logs/eureka-server:/mnt/log/eureka-server #mount from host(./logs/eureka-server) to container(/mnt/log/eureka-server)
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_SERVER_WAIT_TIME_IN_MS_WHEN_SYNC_EMPTY=0
      - EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false
      - LOGGING_FILE_NAME=/mnt/log/eureka-server/app.log #tells app to write log to this file, important when running inside Docker container
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8763/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  #=================
  #THE CONFIG SERVER
  #=================
  config-server:
    build: config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    volumes:
      - ./applicationsConfiguration:/config
      - ./logs/config-server:/mnt/log/config-server #mount from host(./logs/config-server) to container(/mnt/log/config-server)
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config
      - EUREKA_SERVER_URL=http://eureka-server:8763/eureka
      - LOGGING_FILE_NAME=/mnt/log/config-server/app.log #tells app to write log to this file, important when running inside Docker container
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  #=================
  #THE API GATEWAY
  #=================
  api-gateway:
    build: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    volumes:
      - ./logs/api-gateway:/mnt/log/api-gateway #mount from host(./logs/api-gateway) to container(/mnt/log/api-gateway)
    environment:
      - SPRING_APPLICATION_NAME=api-gateway
      - SPRING_PROFILES_ACTIVE=default
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
      - EUREKA_SERVER_URL=http://eureka-server:8763/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - LOGGING_FILE_NAME=/mnt/log/api-gateway/app.log #tells app to write log to this file, important when running inside Docker container
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  #===================
  #THE PRODUCT SERVICE
  #===================
  product-service:
    build: product-service
    container_name: product-service
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ecommerce-jaeger:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      grafana:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      promtail:
        condition: service_started

    volumes:
      - ./logs/product-service:/mnt/log/product-service #mount from host(./logs/product-service) to container(/mnt/log/product-service)
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_APPLICATION_NAME=product-service
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
      - EUREKA_SERVER_URL=http://eureka-server:8763/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - LOGGING_FILE_NAME=/mnt/log/product-service/app.log #tells app to write log to this file, important when running inside Docker container
      - MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0
#      - MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT=http://ecommerce-jaeger:4317 # OTLP gRPC endpoint
#      - MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT=http://ecommerce-jaeger:4318/v1/traces # OTLP HTTP endpoint
      - TRACING_URL=http://ecommerce-jaeger:4318/v1/traces
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  #=====================
  #THE INVENTORY SERVICE
  #=====================
  inventory-service:
    build: inventory-service
    container_name: inventory-service
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ecommerce-jaeger:
        condition: service_healthy

      grafana:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      promtail:
        condition: service_started #promtail may take longer to be healthy, so just ensure it's started

    volumes:
      - ./logs/inventory-service:/mnt/log/inventory-service #mount from host(./logs/inventory-service) to container(/mnt/log/inventory-service)
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_APPLICATION_NAME=inventory-service
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
      - EUREKA_SERVER_URL=http://eureka-server:8763/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - LOGGING_FILE_NAME=/mnt/log/inventory-service/app.log #tells app to write log to this file, important when running inside Docker container
      - MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0
      - TRACING_URL=http://ecommerce-jaeger:4318/v1/traces
#      - MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT=http://ecommerce-jaeger:4318/v1/traces # OTLP HTTP endpoint
#      - MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT=http://ecommerce-jaeger:4317 # OTLP gRPC endpoint
#      - DEBUG=true
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  #=================
  #THE  ORDER SERVICE
  #=================
  order-service:
    build: order-service
    container_name: order-service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      grafana:
        condition: service_healthy
      ecommerce-jaeger:
        condition: service_healthy
      loki:
        condition: service_healthy
      promtail:
        condition: service_started
      prometheus:
        condition: service_healthy
    volumes:
      - ./logs/order-service:/mnt/log/order-service #mount from host(./logs/order-service) to container(/mnt/log/order-service)
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_APPLICATION_NAME=order-service
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
      - EUREKA_SERVER_URL=http://eureka-server:8763/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LOGGING_LEVEL_ORG_APACHE_KAFKA=DEBUG
      - spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
      - spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
      - spring.kafka.properties.spring.json.trusted.packages=*
      - LOGGING_LEVEL_ORG_APACHE_KAFKA_CLIENTS_TELEMETRY=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_KAFKA=DEBUG
      - LOGGING_LEVEL_ORG_APACHE_KAFKA_CLIENTS_ADMIN=WARN
      - LOGGING_FILE_NAME=/mnt/log/order-service/app.log #tells app to write log to this file, important when running inside Docker container
      - MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0
      - TRACING_URL=http://ecommerce-jaeger:4318/v1/traces
#      - MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT=http://ecommerce-jaeger:4318/v1/traces # OTLP HTTP endpoint
#      - MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT=http://ecommerce-jaeger:4317 # OTLP gRPC endpoint
#      - kafka.topics.order-placed=order-placed-topic
#      - kafka.topics.order-cancelled=order-cancelled-topic
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  #========================
  #THE NOTIFICATION SERVICE
  #========================
  notification-service:
    build: notification-service
    container_name: notification-service
    env_file:
      - .env #docker-compose explicitly loads the .env file and injects those values as container env variables. Spring boot inside container then resolves them the same way

    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      grafana:
        condition: service_healthy
      ecommerce-jaeger:
        condition: service_healthy
      loki:
        condition: service_healthy
      promtail:
        condition: service_started
      prometheus:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_APPLICATION_NAME=notification-service
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
      - EUREKA_SERVER_URL=http://eureka-server:8763/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
      - spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
      - spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
      - spring.kafka.consumer.properties.spring.json.trusted.packages=*
      - FIREBASE_CONFIG_PATH=/app/firebase/firebase-service-account.json
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - LOGGING_FILE_NAME=/mnt/log/notification-service/app.log #tells app to write log to this file, important when running inside Docker container
      - MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0
      - TRACING_URL=http://ecommerce-jaeger:4318/v1/traces
#      - MANAGEMENT_TRACING_OTEL_EXPORTER_OTLP_ENDPOINT=http://ecommerce-jaeger:4318/v1/traces # OTLP HTTP endpoint #/v1/traces
#      - MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT=http://ecommerce-jaeger:4317 # OTLP gRPC endpoint
    volumes:
      - ./firebase-service-account.json:/app/firebase/firebase-service-account.json:ro #ro=read only
      - ./logs/notification-service:/mnt/log/notification-service #mount from host(./logs/notification-service) to container(/mnt/log/notification-service)
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

#obsrvability-services
  #=================================
  #Jaeger for distributed tracing
  #==================================
  ecommerce-jaeger:
    #image: jaegertracing/jaeger:2.0.0
    image: jaegertracing/all-in-one:latest
    container_name: ecommerce-jaeger
    restart: always
    ports:
      - "4318:4318" #OTLP HTTP accepts telemetry data using HTTP
      - "16686:16686" #Jaeger UI
      - "4317:4317" #OTLP gRPC accepts telemetry data using gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_HTTP_ENABLED=true
      - COLLECTOR_OTLP_GRPC_ENABLED=true
      - LOG_LEVEL=debug
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:16686"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  #===============================
  #prometheus for metrics scraping
  #http://localhost:9797/targets shows all the targets being scraped by Prometheus, i.e. our microservices
  #===============================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}" #defaults to 9090 if PROMETHEUS_PORT is not set in .env file
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.listen-address=:${PROMETHEUS_PORT:-9090}"
    restart: always
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=3 --spider http://localhost:${PROMETHEUS_PORT:-9090}/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  #===============================
  #loki for log aggregation
  #===============================
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./docker/loki/data:/tmp/loki #persist loki data, generate if not exists
    command: -config.file=/etc/loki/loki-config.yml #enure loki uses our config file
    networks:
      - microservices-network
    healthcheck:
      #Ref for accurate health check:
      #https://github.com/grafana/loki/blob/main/examples/getting-started/docker-compose.yaml
      test: [ "CMD-SHELL", "wget --no-verbose --tries=3 --spider http://localhost:3100/ready || exit 1" ]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3

  #===============================
  #Promtail for shipping logs to Loki
  #===============================
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "9080:9080" #promtail metrics/ui endpoint (optional)
    restart: always
    volumes:
      - /var/log:/var/log:ro #system logs
      - /var/lib/docker/containers:/var/lib/docker/containers:ro #docker container logs
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro #promtail config file
      - ./docker/promtail/data:/tmp #persist promtail data, generate if not exists, directory for Promtail position tracking
      - ./logs:/mnt/log:ro #mount the local logs directory to /mnt/log inside the container
      #define service logs path if you want to scrape application logs written to host directory
      #Mount the local services log directory, so Promtail can see the local logs at
      #/var/log/<service-name> inside the container which matches
      # __path__: /var/log/<service-name>/*.log defined in promtail-config.yml for each service
      #WORKS for both running locally and inside Docker container
      #mnt is used instead of var to avoid causing issue read/write permission issue
      - ./logs/inventory-service:/mnt/log/inventory-service:ro #mount from host(./logs/inventory-service) to container(mnt/log/inventory-service)
      - ./logs/product-service:/mnt/log/product-service:ro
      - ./logs/order-service:/mnt/log/order-service:ro
      - ./logs/notification-service:/mnt/log/notification-service:ro
      - ./logs/api-gateway:/mnt/log/api-gateway:ro
      - ./logs/config-server:/mnt/log/config-server:ro
      - ./logs/eureka-server:/mnt/log/eureka-server:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=3 --spider http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 5

  #===============================================
  #Grafana for visualization (metrics, logs, traces)
  #===============================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      ecommerce-jaeger:
        condition: service_healthy
    volumes:
      - ./docker/grafana:/var/lib/grafana
    env_file:
      - ./docker/grafana/grafana-config.env
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  microservices-network:
    driver: bridge
volumes:
  postgres-data:


