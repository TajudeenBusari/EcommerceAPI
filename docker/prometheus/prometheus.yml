global:
  scrape_interval: 5s

scrape_configs:
  #INVENTORY-SERVICE
  - job_name: 'inventory-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['inventory-service:8084'] # for Docker container
      - targets: ['host.docker.internal:8084'] # for local testing outside Docker
    relabel_configs:
       #rename host.docker.internal to inventory-service for clarity in Grafana
      - source_labels: ['__address__']
        regex: 'host\.docker\.internal:8084'
        replacement: 'inventory-service:8084'
        target_label: instance

  #PRODUCT-SERVICE
  - job_name: 'product-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['product-service:8083']
      - targets: ['host.docker.internal:8083']
    relabel_configs:
       #rename host.docker.internal to product-service for clarity in Grafana
      - source_labels: ['__address__']
        regex: 'host\.docker\.internal:8083'
        replacement: 'product-service:8083'
        target_label: instance

  #ORDER-SERVICE
  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['order-service:8082']
      - targets: ['host.docker.internal:8082']
    relabel_configs:
      #rename host.docker.internal to order-service for clarity in Grafana
      - source_labels: ['__address__']
        regex: 'host\.docker\.internal:8082'
        replacement: 'order-service:8082'
        target_label: instance

  #NOTIFICATION-SERVICE
  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8085']
      - targets: ['host.docker.internal:8085']
    relabel_configs:
      - source_labels: ['__address__']
        regex: 'host\.docker\.internal:8085'
        replacement: 'notification-service:8085'
        target_label: instance

  #API-GATEWAY
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
      - targets: ['host.docker.internal:8080']
    relabel_configs:
      - source_labels:
        regex: 'host\.docker\.internal:8080'
        replacement: 'api-gateway:8080'
        target_label: instance

  #CONFIG-SERVER
  - job_name: 'config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['config-server:8888']
      - targets: ['host.docker.internal:8888']
    relabel_configs:
      - source_labels: ['__address__']
        regex: 'host\.docker\.internal:8888'
        replacement: 'config-server:8888'
        target_label: instance

  #EUREKA-SERVER
  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
        - targets: ['eureka-server:8763']
        - targets: ['host.docker.internal:8763']
    relabel_configs:
      - source_labels: ['__address__']
        regex: 'host\.docker\.internal:8763'
        replacement: 'eureka-server:8763'
        target_label: instance


